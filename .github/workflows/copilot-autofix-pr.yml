name: Copilot autofix for PR failures

on:
  workflow_run:
    workflows: ["PR checks"]
    types: [completed]

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write

jobs:
  request-copilot-fix:
    if: ${{ github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.actor.login != 'copilot-swe-agent[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Ask Copilot to fix this PR
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const pr = run.pull_requests?.[0];

            if (!pr) {
              core.info("No pull request is associated with this workflow run.");
              return;
            }

            const repoFullName = `${context.repo.owner}/${context.repo.repo}`;
            if (run.head_repository?.full_name !== repoFullName) {
              core.info("Skipping PR from forked repository.");
              return;
            }

            const marker = `<!-- copilot-autofix-sha:${run.head_sha} -->`;
            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                per_page: 100
              }
            );

            if (comments.some((comment) => comment.body?.includes(marker))) {
              core.info("An autofix request already exists for this commit SHA.");
              return;
            }

            const jobs = await github.paginate(
              github.rest.actions.listJobsForWorkflowRun,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: run.id,
                per_page: 100
              }
            );

            const failedSteps = jobs
              .filter((job) => job.conclusion === "failure")
              .flatMap((job) => {
                const stepFailures = (job.steps || [])
                  .filter((step) => step.conclusion === "failure")
                  .map((step) => `\`${job.name}\` -> \`${step.name}\``);
                return stepFailures.length > 0 ? stepFailures : [`\`${job.name}\``];
              })
              .slice(0, 20);

            const failuresSummary = failedSteps.length > 0
              ? failedSteps.map((line) => `- ${line}`).join("\n")
              : "- Review the workflow logs for details.";

            const shortSha = run.head_sha.slice(0, 7);
            const body = [
              marker,
              `@copilot The **PR checks** workflow failed for this PR (commit \`${shortSha}\`).`,
              "Please fix the lint/test/build failures and push changes directly to this PR branch.",
              "",
              "**Failed steps**",
              failuresSummary,
              "",
              `**Run:** ${run.html_url}`,
              "",
              "**Requirements**",
              "- Do not disable checks or skip tests.",
              "- Keep existing behavior intact.",
              "- Update tests when behavior changes are required."
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body
            });

            core.info(`Posted Copilot autofix request to PR #${pr.number}.`);
