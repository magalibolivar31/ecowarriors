name: PR checks

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install functions dependencies
        run: npm --prefix functions ci

      - name: Lint
        run: npm run lint

      - name: Test (coverage)
        run: npm run test:coverage

      - name: Functions build
        run: npm --prefix functions run build

      - name: Functions test (coverage)
        run: npm --prefix functions run test:coverage

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ci_dummy
          VITE_FIREBASE_AUTH_DOMAIN: ci_dummy
          VITE_FIREBASE_PROJECT_ID: ci_dummy
          VITE_FIREBASE_STORAGE_BUCKET: ci_dummy
          VITE_FIREBASE_MESSAGING_SENDER_ID: ci_dummy
          VITE_FIREBASE_APP_ID: ci_dummy
          VITE_GEMINI_API_KEY: ci_dummy
